<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>דוח סיום שנה — אולפן לביא</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://accounts.google.com/gsi/client"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', -apple-system, sans-serif; background: #f0ede8; color: #2e2e2e; direction: rtl; min-height: 100vh; }
.page { max-width: 880px; margin: 0 auto; padding: 0 0 3rem; }
.app-header { background: #025db8; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.logo { font-family: 'League Spartan', sans-serif; font-weight: 700; font-size: 24px; color: #fff; line-height: 1.1; }
.logo span { display: block; }
.logo .lavi { padding-right: 20px; }
.header-right { text-align: left; direction: ltr; }
.header-title { color: #fff; font-family: 'League Spartan', sans-serif; font-size: 15px; font-weight: 600; }
.header-sub { color: rgba(255,255,255,0.65); font-size: 12px; margin-top: 2px; }
.content { padding: 0 1.25rem; }
.card { background: #FFF9F2; border: 0.5px solid rgba(2,93,184,0.15); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.login-card { max-width: 420px; margin: 3rem auto; text-align: center; padding: 2.5rem 2rem; }
.login-logo { font-family: 'League Spartan', sans-serif; font-weight: 700; font-size: 38px; color: #025db8; line-height: 1.05; margin-bottom: 1.5rem; }
.login-logo .lavi-line { padding-right: 24px; display: block; }
.login-title { font-family: 'League Spartan', sans-serif; font-size: 18px; font-weight: 700; color: #2e2e2e; margin-bottom: 6px; direction: ltr; }
.login-sub { font-size: 13px; color: #888; margin-bottom: 2rem; direction: ltr; line-height: 1.6; }
.login-divider { border: none; border-top: 0.5px solid rgba(2,93,184,0.12); margin: 1.5rem 0; }
#google-btn-wrap { display: flex; justify-content: center; margin-bottom: 0.5rem; }
.login-domain-note { font-size: 11px; color: #aaa; margin-top: 1.25rem; direction: ltr; }
.login-domain-note strong { color: #025db8; }
.user-pill { display: flex; align-items: center; gap: 8px; direction: ltr; }
.user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); object-fit: cover; }
.user-avatar-initials { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-name-header { color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 500; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btn-logout { padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: transparent; color: rgba(255,255,255,0.85); font-family: 'Poppins', sans-serif; font-size: 12px; cursor: pointer; transition: background .15s; white-space: nowrap; }
.btn-logout:hover { background: rgba(255,255,255,0.12); }
.btn-ghost { padding: 8px 16px; border-radius: 8px; border: 0.5px solid rgba(2,93,184,0.3); background: transparent; color: #025db8; font-family: 'Poppins', sans-serif; font-size: 13px; cursor: pointer; }
.btn-ghost:hover { background: rgba(2,93,184,0.05); }
.prof-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.prof-name { font-family: 'League Spartan', sans-serif; font-size: 22px; font-weight: 700; color: #025db8; }
.prof-meta { font-size: 13px; color: #888; margin-top: 3px; }
.classe-block { background: #FFF9F2; border: 0.5px solid rgba(2,93,184,0.15); border-radius: 12px; margin-bottom: 0.75rem; overflow: hidden; transition: border-color .2s; }
.classe-block.sent { border-color: #1d8653; }
.classe-block.open { border-color: #025db8; box-shadow: 0 2px 12px rgba(2,93,184,0.1); }
.classe-header { background: #025db8; padding: 0.85rem 1.25rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; cursor: pointer; user-select: none; transition: background .2s; }
.classe-block.sent .classe-header { background: #1d8653; }
.classe-header:hover { filter: brightness(1.08); }
.classe-header-left { display: flex; align-items: center; gap: 10px; }
.classe-title { font-family: 'League Spartan', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
.classe-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tag { display: inline-block; background: rgba(255,255,255,0.2); color: #fff; border-radius: 20px; font-size: 11px; padding: 2px 10px; }
.tag-sent { background: rgba(255,255,255,0.35); font-weight: 700; }
.chevron { color: rgba(255,255,255,0.8); font-size: 18px; transition: transform .25s; flex-shrink: 0; }
.classe-block.open .chevron { transform: rotate(180deg); }
.classe-body { display: none; }
.classe-block.open .classe-body { display: block; }
.infos-classe { padding: 1rem 1.25rem; border-bottom: 0.5px solid rgba(2,93,184,0.1); }
.infos-grid { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: start; }
.infos-full { grid-column: 1 / -1; }
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 12px; color: #888; font-weight: 500; }
.field-input { padding: 8px 10px; border-radius: 8px; border: 0.5px solid rgba(2,93,184,0.2); font-family: 'Poppins', sans-serif; font-size: 13px; color: #2e2e2e; background: #fff; direction: rtl; }
.field-input:focus { outline: none; border-color: #025db8; }
textarea.field-input { min-height: 58px; resize: vertical; }
input[type=number].field-input { max-width: 80px; text-align: center; direction: ltr; }
.students-wrap { overflow-x: auto; }
table.students { width: 100%; border-collapse: collapse; direction: rtl; }
.students th { padding: 9px 14px; font-size: 12px; font-weight: 500; color: #888; text-align: right; background: #f5f2ee; border-bottom: 0.5px solid rgba(2,93,184,0.1); }
.students td { padding: 9px 14px; border-bottom: 0.5px solid rgba(2,93,184,0.07); vertical-align: top; }
.students tr:last-child td { border-bottom: none; }
.student-name { font-size: 14px; font-weight: 500; color: #2e2e2e; }
.badge-pres { display: inline-block; border-radius: 20px; font-size: 12px; font-weight: 500; padding: 2px 10px; background: rgba(2,93,184,0.1); color: #025db8; }
.badge-unknown { background: #eee; color: #aaa; }
textarea.eval { width: 100%; min-height: 48px; padding: 6px 8px; border-radius: 8px; border: 0.5px solid rgba(2,93,184,0.2); font-family: 'Poppins', sans-serif; font-size: 12px; resize: vertical; direction: rtl; color: #2e2e2e; background: #fff; }
textarea.eval:focus { outline: none; border-color: #025db8; }
select.passage { padding: 6px 8px; border-radius: 8px; border: 0.5px solid rgba(2,93,184,0.2); font-family: 'Poppins', sans-serif; font-size: 12px; background: #fff; direction: rtl; color: #2e2e2e; width: 100%; }
select.passage:focus { outline: none; border-color: #025db8; }
.class-submit-area { padding: 1rem 1.25rem; border-top: 0.5px solid rgba(2,93,184,0.1); display: flex; align-items: center; justify-content: space-between; gap: 12px; direction: ltr; }
.btn-submit-class { padding: 11px 28px; border-radius: 10px; border: none; background: #f55700; color: #fff; font-family: 'League Spartan', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s; white-space: nowrap; }
.btn-submit-class:hover { background: #d94a00; }
.btn-submit-class:disabled { background: #bbb; cursor: not-allowed; }
.btn-submit-class.done { background: #1d8653; cursor: default; }
.submit-class-note { font-size: 12px; color: #aaa; }
.loading { text-align: center; padding: 3rem 1rem; color: #888; font-size: 14px; direction: ltr; }
.spinner { display: inline-block; width: 22px; height: 22px; border: 2px solid #ddd; border-top-color: #025db8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { background: #fff0f0; color: #c00; border: 0.5px solid #fcc; border-radius: 8px; padding: 12px 16px; font-size: 13px; margin: 0.75rem 0; direction: ltr; }
.success-screen { background: #FFF9F2; border: 0.5px solid rgba(2,93,184,0.15); border-radius: 12px; padding: 3rem 2rem; text-align: center; direction: ltr; }
.success-icon { font-size: 44px; margin-bottom: 1rem; }
.success-screen h2 { font-family: 'League Spartan', sans-serif; font-size: 22px; font-weight: 700; color: #025db8; margin-bottom: 8px; }
.success-screen p { font-size: 14px; color: #666; }
@media (max-width: 600px) {
  .infos-grid { grid-template-columns: 1fr; }
  .students th:nth-child(3), .students td:nth-child(3) { display: none; }
  .app-header { padding: 0.85rem 1rem; }
  .login-card { margin: 1.5rem auto; padding: 2rem 1.25rem; }
}
</style>
</head>
<body>
<div class="page">
  <div class="app-header">
    <div class="logo">
      <span>Oulpan</span>
      <span class="lavi">Lavi</span>
    </div>
    <div id="header-right" class="header-right">
      <div class="header-title">דוח סיום שנה</div>
      <div class="header-sub">Rapport annuel fin d'année • 5786</div>
    </div>
  </div>
  <div class="content">
    <div id="root"></div>
  </div>
</div>

<script>
const GOOGLE_CLIENT_ID = '208792012375-tah7nn3utsgsnbgs9fv2ah5mr17qcr6n.apps.googleusercontent.com';
const ALLOWED_DOMAIN   = 'oulpanlavi.com';

const BASE_COURS     = 'appNbwmEyVQsXA25U';
const BASE_PRESENCE  = 'appkhAfrnk3fafBwM';
const TABLE_TEACHERS = 'tbl6i9FU406js7Edw';
const TABLE_CLASSES  = 'tblTs7XeOJbkEcSf1';
const TABLE_STUDENTS = 'tblnFCt3Ne5oHwhlr';
const TABLE_PRESENCE = 'tblVpk0mZAYBAuCGG';
const TABLE_RAPPORTS = 'tblpXR4YXdAhqlCqA';
const AIRTABLE_KEY   = 'patQN9qTSmLV5aKkl.27894395be4f0d150d7d26f35598c9e9fefdef6ee976dbad3dfecb9464a602f8';

let sentClasses = {};
let state = { teacher: null, classes: [], students: {}, presences: {}, googleUser: null };

async function api(base, table, params='', method='GET', body=null) {
  const url = `https://api.airtable.com/v0/${base}/${table}${params}`;
  const opts = {
    method: method || 'GET',
    headers: { 'Authorization': 'Bearer ' + AIRTABLE_KEY, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(JSON.stringify(data));
  return data;
}

async function getAll(base, table, params='') {
  let records=[], offset=null;
  do {
    let url = params || '';
    if (offset) url = url ? `${url}&offset=${offset}` : `?offset=${offset}`;
    const data = await api(base, table, url);
    records = records.concat(data.records || []);
    offset = data.offset || null;
  } while(offset);
  return records;
}

function setRoot(html) { document.getElementById('root').innerHTML = html; }
function loading(msg)  { setRoot(`<div class="loading"><div class="spinner"></div><br>${msg}</div>`); }

function renderHeaderUser(googleUser) {
  const initials = (googleUser.name || '?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('header-right').innerHTML = `
    <div class="user-pill">
      ${googleUser.picture
        ? `<img class="user-avatar" src="${googleUser.picture}" referrerpolicy="no-referrer" />`
        : `<div class="user-avatar-initials">${initials}</div>`}
      <span class="user-name-header">${googleUser.name}</span>
      <button class="btn-logout" onclick="logout()">התנתקות</button>
    </div>`;
}

function renderHeaderDefault() {
  document.getElementById('header-right').innerHTML = `
    <div class="header-title">דוח סיום שנה</div>
    <div class="header-sub">Rapport annuel fin d'année • 5786</div>`;
}

function init() {
  sentClasses = {};
  state = { teacher: null, classes: [], students: {}, presences: {}, googleUser: null };
  renderHeaderDefault();
  renderLoginGoogle();
}

function renderLoginGoogle(err) {
  setRoot(`
    <div class="card login-card">
      <div class="login-logo">
        <span>Oulpan</span>
        <span class="lavi-line">Lavi</span>
      </div>
      <div class="login-title">דוח סיום שנה 5786</div>
      <div class="login-sub">Connectez-vous avec votre compte Google<br>pour accéder à vos classes.</div>
      ${err ? `<div class="error-msg">${err}</div>` : ''}
      <hr class="login-divider" />
      <div id="google-btn-wrap"></div>
      <div class="login-domain-note">Réservé aux comptes <strong>@${ALLOWED_DOMAIN}</strong></div>
    </div>
  `);
  waitForGSI(() => {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleCredential,
      auto_select: false,
    });
    google.accounts.id.renderButton(
      document.getElementById('google-btn-wrap'),
      { theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular', width: 280 }
    );
  });
}

function waitForGSI(cb, attempt=0) {
  if (typeof google !== 'undefined' && google.accounts && google.accounts.id) { cb(); return; }
  if (attempt > 100) {
    console.warn('GSI not loaded');
    const wrap = document.getElementById('google-btn-wrap');
    if (wrap) wrap.innerHTML = '<div style="color:#c00;font-size:13px;direction:ltr;">Impossible de charger la connexion Google.<br>Vérifiez votre connexion et rechargez la page.</div>';
    return;
  }
  setTimeout(() => waitForGSI(cb, attempt+1), 200);
}

function handleGoogleCredential(response) {
  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    const email  = (payload.email || '').toLowerCase();
    const domain = email.split('@')[1] || '';
    if (domain !== ALLOWED_DOMAIN) {
      renderLoginGoogle(`Accès refusé. Seuls les comptes @${ALLOWED_DOMAIN} sont autorisés.<br>Compte utilisé : <strong>${email}</strong>`);
      return;
    }
    state.googleUser = { email, name: payload.name || '', picture: payload.picture || '' };
    renderHeaderUser(state.googleUser);
    loginByEmail(email);
  } catch(e) {
    renderLoginGoogle('Erreur lors de la connexion Google. Veuillez réessayer.');
  }
}

function logout() {
  if (typeof google !== 'undefined' && google.accounts) {
    google.accounts.id.disableAutoSelect();
  }
  init();
}

async function loginByEmail(email) {
  loading('Vérification de votre compte...');
  try {
    const recs  = await getAll(BASE_COURS, TABLE_TEACHERS, '');
    const found = recs.find(r => (r.fields['Email'] || '').trim().toLowerCase() === email);
    if (!found) {
      renderHeaderDefault();
      state.googleUser = null;
      renderLoginGoogle(`Compte non trouvé dans Airtable : <strong>${email}</strong><br>Contactez l'administration.`);
      return;
    }
    const classIds = found.fields['Classes 5786'] || [];
    state.teacher = { id: found.id, name: (found.fields['Name'] || '').trim(), email: found.fields['Email'] || '', classIds };
    if (!state.teacher.classIds.length) { renderLoginGoogle('Aucune classe trouvée pour ce compte.'); return; }
    await loadClasses();
  } catch(e) { setRoot(`<div class="error-msg">Erreur : ${e.message}</div>`); }
}

async function loadClasses() {
  loading('Chargement de vos classes...');
  try {
    state.classes = []; state.students = {};
    for (const cid of state.teacher.classIds) {
      const cls = await api(BASE_COURS, TABLE_CLASSES, `/${cid}`);
      const f = cls.fields;
      if (!['Complete', 'In Progress'].includes(f['Status'])) continue;
      state.classes.push({ id: cid, num: f['Numéro de Classe'] || f['Name'] || cid, chapitre: f['Chapitre en cours'] || '', niveau: f['Niveau'] || '', studentIds: f['Students'] || [] });
    }
    const allStudentIds = [...new Set(state.classes.flatMap(c => c.studentIds))];
    for (let i = 0; i < allStudentIds.length; i += 10) {
      const batch = allStudentIds.slice(i, i + 10);
      const formula = encodeURIComponent(`OR(${batch.map(id => `RECORD_ID()="${id}"`).join(',')})`);
      const res = await api(BASE_COURS, TABLE_STUDENTS, `?filterByFormula=${formula}`);
      for (const r of (res.records || [])) state.students[r.id] = (r.fields['Name'] || r.id).trim();
    }
    loading('Chargement des présences...');
    state.presences = {};
    for (const cls of state.classes) {
      const formula = encodeURIComponent(`{Classe}="${cls.num}"`);
      const res = await getAll(BASE_PRESENCE, TABLE_PRESENCE, `?filterByFormula=${formula}`);
      for (const r of res) {
        const n = (r.fields['Name'] || '').trim();
        if (n) state.presences[`${n}__${cls.num}`] = r.fields['Nombre de présences'] || 0;
      }
    }
    renderForm();
  } catch(e) { setRoot(`<div class="error-msg">Erreur : ${e.message}</div>`); }
}

function toggleClass(classId) {
  document.querySelectorAll('.classe-block').forEach(b => {
    if (b.id === `block-${classId}`) b.classList.toggle('open');
    else b.classList.remove('open');
  });
}

function renderForm() {
  const t = state.teacher;
  let html = `
    <div class="prof-header">
      <div>
        <div class="prof-name">${t.name}</div>
        <div class="prof-meta">${state.classes.length} כיתה${state.classes.length!==1?'ות':''} • שנת 5786</div>
      </div>
    </div>`;

  state.classes.forEach((cls, idx) => {
    const isSent = sentClasses[cls.id] === 'sent';
    const isOpen = idx === 0;
    html += `
    <div class="classe-block${isSent?' sent':''}${isOpen?' open':''}" id="block-${cls.id}">
      <div class="classe-header" onclick="toggleClass('${cls.id}')">
        <div class="classe-header-left">
          <div class="classe-title">כיתה ${cls.num}</div>
          <div class="classe-tags">
            ${cls.niveau ? `<span class="tag">${cls.niveau}</span>` : ''}
            <span class="tag">${cls.studentIds.length} תלמידים</span>
            ${cls.chapitre ? `<span class="tag">פרק ${cls.chapitre}</span>` : ''}
            ${isSent ? `<span class="tag tag-sent">✓ נשלח</span>` : ''}
          </div>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="classe-body">
        <div class="infos-classe">
          <div class="infos-grid">
            <div class="field-group">
              <label class="field-label">עד איזה פרק הגענו?</label>
              <input type="number" class="field-input" id="perek-${cls.id}" value="${cls.chapitre||''}" min="1" max="60" ${isSent?'disabled':''} />
            </div>
            <div></div>
            <div class="field-group infos-full">
              <label class="field-label">מה הספקנו — contenu couvert</label>
              <textarea class="field-input" id="contenu-${cls.id}" rows="2" placeholder="שלבים שהושלמו, נושאים שנלמדו..." ${isSent?'disabled':''}></textarea>
            </div>
            <div class="field-group infos-full">
              <label class="field-label">הערות פדגוגיות — remarques générales</label>
              <textarea class="field-input" id="remarques-${cls.id}" rows="2" placeholder="דינמיקה של הכיתה, אתגרים..." ${isSent?'disabled':''}></textarea>
            </div>
          </div>
        </div>
        <div class="students-wrap">
          <table class="students">
            <thead><tr>
              <th>שם התלמיד/ה</th>
              <th style="width:90px;text-align:center;">נוכחות</th>
              <th style="min-width:190px;">הערכה אישית</th>
              <th style="width:135px;">המשך לרמה הבאה?</th>
            </tr></thead>
            <tbody>`;

    const sortedStudentIds = [...cls.studentIds].sort((a, b) => {
      const nameA = state.students[a] || a;
      const nameB = state.students[b] || b;
      return (state.presences[`${nameB}__${cls.num}`] ?? -1) - (state.presences[`${nameA}__${cls.num}`] ?? -1);
    });

    for (const sid of sortedStudentIds) {
      const name = state.students[sid] || sid;
      const pres = state.presences[`${name}__${cls.num}`];
      const presHtml = pres !== undefined ? `<span class="badge-pres">${pres}</span>` : `<span class="badge-pres badge-unknown">—</span>`;
      html += `<tr>
        <td class="student-name">${name}</td>
        <td style="text-align:center;">${presHtml}</td>
        <td><textarea class="eval" id="eval-${cls.id}-${sid}" placeholder="הערות..." ${isSent?'disabled':''}></textarea></td>
        <td><select class="passage" id="passage-${cls.id}-${sid}" ${isSent?'disabled':''}>
          <option value="">—</option>
          <option value="כן">כן ✓</option>
          <option value="לא">לא ✗</option>
          <option value="לדון">לדון ?</option>
        </select></td>
      </tr>`;
    }

    html += `</tbody></table></div>
        <div class="class-submit-area">
          <div class="submit-class-note">${isSent ? 'Classe enregistrée dans Airtable ✓' : 'Enregistre uniquement cette classe'}</div>
          <button class="btn-submit-class${isSent?' done':''}" id="btn-${cls.id}" onclick="submitClass('${cls.id}')" ${isSent?'disabled':''}>${isSent ? '✓ נשלח' : '✉ שמירה ושליחה'}</button>
        </div>
      </div>
    </div>`;
  });

  setRoot(html);
}

async function submitClass(classId) {
  const cls = state.classes.find(c => c.id === classId);
  if (!cls) return;
  const btn = document.getElementById(`btn-${classId}`);
  btn.disabled = true; btn.textContent = 'שומר...';
  const now       = new Date().toISOString();
  const perek     = document.getElementById(`perek-${classId}`)?.value;
  const contenu   = document.getElementById(`contenu-${classId}`)?.value || '';
  const remarques = document.getElementById(`remarques-${classId}`)?.value || '';
  const records   = cls.studentIds.map(sid => {
    const name    = state.students[sid] || sid;
    const pres    = state.presences[`${name}__${cls.num}`];
    const evalVal = document.getElementById(`eval-${classId}-${sid}`)?.value || '';
    const passage = document.getElementById(`passage-${classId}-${sid}`)?.value || '';
    return { fields: {
      'fldv20CiFCcpI5D0a': name,
      'fld5pPY7sfAzWNFJB': cls.num,
      'fldUqnBJ4rcoXUZw1': state.teacher.name,
      'fldcnIaGnFqbmvgCk': typeof pres === 'number' ? pres : 0,
      'fldBkPM3GLSEh9ocV': evalVal,
      'fldsjADeAmUvt8zvO': passage || null,
      'fldR4g4kg2q3t1BPr': perek ? parseInt(perek) : null,
      'fldMJlONdkB6SJANA': contenu,
      'fldD7fivLb4cV91Uc': remarques,
      'fldjrcq6Y3qfsICAi': now
    }};
  });
  try {
    for (let i = 0; i < records.length; i += 10) {
      await api(BASE_COURS, TABLE_RAPPORTS, '', 'POST', { records: records.slice(i, i + 10) });
    }
    sentClasses[classId] = 'sent';
    const block = document.getElementById(`block-${classId}`);
    if (block) {
      block.classList.add('sent'); block.classList.remove('open');
      block.querySelector('.classe-header').style.background = '#1d8653';
      const tags = block.querySelector('.classe-tags');
      if (tags && !tags.querySelector('.tag-sent')) tags.insertAdjacentHTML('beforeend', `<span class="tag tag-sent">✓ נשלח</span>`);
      block.querySelectorAll('input, textarea, select').forEach(el => el.disabled = true);
      btn.classList.add('done'); btn.textContent = '✓ נשלח'; btn.disabled = true;
      const note = block.querySelector('.submit-class-note');
      if (note) note.textContent = 'Classe enregistrée dans Airtable ✓';
    }
    const nextCls = state.classes.find(c => !sentClasses[c.id]);
    if (nextCls) {
      document.querySelectorAll('.classe-block').forEach(b => b.classList.remove('open'));
      const nextBlock = document.getElementById(`block-${nextCls.id}`);
      if (nextBlock) { nextBlock.classList.add('open'); nextBlock.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    } else {
      const total = state.classes.reduce((acc, c) => acc + c.studentIds.length, 0);
      setRoot(`<div class="success-screen">
        <div class="success-icon">✅</div>
        <h2>הדוח נשמר בהצלחה!</h2>
        <p>${total} תלמידים נשמרו ב-Airtable</p>
        <p style="margin-top:6px;">תודה רבה, ${state.teacher.name}!</p>
        <button class="btn-ghost" style="margin-top:1.5rem;" onclick="init()">← חזור לדף הכניסה</button>
      </div>`);
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = '✉ שמירה ושליחה';
    document.getElementById(`block-${classId}`)?.insertAdjacentHTML('afterbegin', `<div class="error-msg" style="margin:0.75rem 1.25rem;">Erreur : ${e.message}</div>`);
  }
}

init();
</script>
</body>
</html>
